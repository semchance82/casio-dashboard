<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>CASIO</title>
<style>
@font-face {
  font-family: 'DSEG7';
  src: url('https://cdn.jsdelivr.net/npm/dseg@0.46.0/fonts/DSEG7-Classic/DSEG7Classic-Regular.woff2') format('woff2'),
       url('https://cdn.jsdelivr.net/npm/dseg@0.46.0/fonts/DSEG7-Classic/DSEG7Classic-Regular.woff') format('woff');
}
</style>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { width:100%; height:100%; overflow:hidden; background:#060400; font-family:'Share Tech Mono','Courier New',monospace; }

#app { width:100%; height:100%; display:-webkit-flex; display:flex; -webkit-flex-direction:column; flex-direction:column; padding:2vw 3vw; }

/* TOP BAR */
#top-bar { display:-webkit-flex; display:flex; -webkit-justify-content:space-between; justify-content:space-between; -webkit-align-items:center; align-items:center; margin-bottom:1vh; }
.top-label { font-size:1.8vw; letter-spacing:0.25em; color:#3a2200; text-transform:uppercase; }
#alarm-ind { font-size:1.8vw; letter-spacing:0.2em; color:#c87f00; }

/* RELOJ */
#clock-block { -webkit-flex:1; flex:1; display:-webkit-flex; display:flex; -webkit-flex-direction:column; flex-direction:column; -webkit-align-items:center; align-items:center; -webkit-justify-content:center; justify-content:center; }
.lcd-wrap { position:relative; display:inline-block; line-height:1; }
.lcd-ghost { font-family:'DSEG7','Courier New',monospace; font-size:28vw; letter-spacing:0.04em; position:absolute; top:0; left:0; color:#1a0d00; pointer-events:none; }
.lcd-real { font-family:'DSEG7','Courier New',monospace; font-size:28vw; letter-spacing:0.04em; position:relative; color:#ffb300; text-shadow:0 0 30px rgba(255,179,0,0.6),0 0 60px rgba(255,179,0,0.2); }
.sep-blink { -webkit-animation:blink 1s step-end infinite; animation:blink 1s step-end infinite; }
@-webkit-keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.06} }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.06} }
#date-row { display:-webkit-flex; display:flex; -webkit-align-items:center; align-items:center; -webkit-justify-content:center; justify-content:center; gap:4vw; margin-top:1.5vh; }
.date-chip { font-size:3vw; letter-spacing:0.22em; color:#c87f00; text-transform:uppercase; }
.date-chip.dim { color:#7a4e00; }
#sec-disp { font-family:'DSEG7','Courier New',monospace; font-size:3.5vw; color:#3a2200; }

/* DIVISOR */
#divider { border:none; border-top:1px solid #1a0d00; margin:1.5vh 0; }

/* WIDGETS */
#widgets { display:-webkit-flex; display:flex; -webkit-flex-direction:row; flex-direction:row; gap:2vw; height:30vh; }
.widget { -webkit-flex:1; flex:1; border:1px solid #1a0d00; border-radius:3px; padding:1.5vh 2vw; display:-webkit-flex; display:flex; -webkit-flex-direction:column; flex-direction:column; overflow:hidden; }
.widget-label { font-size:1.5vw; letter-spacing:0.3em; color:#2a1400; text-transform:uppercase; border-bottom:1px solid #150b00; padding-bottom:0.5vh; margin-bottom:0.8vh; }

/* CLIMA */
#w-clima { -webkit-flex:1.1; flex:1.1; }
.temp-wrap { position:relative; display:inline-block; line-height:1; }
.temp-ghost { font-family:'DSEG7','Courier New',monospace; font-size:7vw; letter-spacing:0.04em; position:absolute; top:0; left:0; color:#1a0d00; }
.temp-real { font-family:'DSEG7','Courier New',monospace; font-size:7vw; letter-spacing:0.04em; position:relative; color:#ffb300; text-shadow:0 0 10px rgba(255,179,0,0.4); }
.temp-real sup { font-size:2vw; vertical-align:super; font-family:'Share Tech Mono','Courier New',monospace; opacity:0.7; }
.w-line { font-size:1.5vw; letter-spacing:0.06em; color:#3a2200; margin-top:0.3vh; line-height:1.8; }
.w-line b { color:#c87f00; }

/* RADIO */
#w-radio { -webkit-flex:1.2; flex:1.2; }
.radio-btn {
  background:transparent; border:1px solid #2a1400; color:#5a3800;
  font-family:'Share Tech Mono','Courier New',monospace;
  font-size:1.7vw; letter-spacing:0.1em;
  padding:1vh 1.5vw; cursor:pointer; text-align:left;
  border-radius:2px; -webkit-appearance:none;
  margin-bottom:1vh; width:100%; display:block;
}
.radio-btn:last-child { margin-bottom:0; }
.radio-btn.playing { border-color:#c87f00; color:#ffb300; background:rgba(255,179,0,0.05); }

/* ALARMA */
#w-alarm { -webkit-flex:1.3; flex:1.3; }
.alarm-display {
  font-family:'DSEG7','Courier New',monospace;
  font-size:4.2vw; color:#3a2200;
  letter-spacing:0.06em; text-align:center;
  margin-bottom:0.8vh; line-height:1;
}
.alarm-display.set { color:#ffb300; text-shadow:0 0 10px rgba(255,179,0,0.3); }
.alarm-btns { display:-webkit-flex; display:flex; gap:1vw; }
.alarm-btn-sm {
  -webkit-flex:1; flex:1;
  background:transparent; border:1px solid #2a1400; color:#3a2200;
  font-family:'Share Tech Mono','Courier New',monospace;
  font-size:1.5vw; letter-spacing:0.08em;
  padding:0.7vh 0; cursor:pointer; border-radius:2px;
  -webkit-appearance:none; text-align:center;
}
.alarm-btn-sm.active { border-color:#c87f00; color:#c87f00; }

/* NOTICIAS */
#w-news { -webkit-flex:1.8; flex:1.8; }
#news-source { font-size:1.4vw; letter-spacing:0.3em; color:#2a1400; text-transform:uppercase; margin-bottom:0.4vh; }
#news-headline { font-size:1.7vw; color:#5a3800; letter-spacing:0.04em; line-height:1.6; display:-webkit-box; -webkit-line-clamp:4; -webkit-box-orient:vertical; overflow:hidden; transition:opacity 0.3s; }

/* MODO NOCHE */
.night #widgets { display:none; }
.night #divider { display:none; }
.night .lcd-real { font-size:34vw; }
.night .lcd-ghost { font-size:34vw; }
.night .date-chip { font-size:3.5vw; }
.night #night-bar { display:-webkit-flex !important; display:flex !important; }

#night-bar {
  display:none;
  -webkit-flex-direction:row; flex-direction:row;
  -webkit-justify-content:center; justify-content:center;
  -webkit-align-items:center; align-items:center;
  gap:3vw; padding:2vh 0 1vh;
}
.night-btn {
  background:transparent; border:1px solid #2a1400; color:#3a2200;
  font-family:'Share Tech Mono','Courier New',monospace;
  font-size:2vw; letter-spacing:0.15em;
  padding:1vh 3vw; cursor:pointer; border-radius:2px; -webkit-appearance:none;
}
.night-btn.playing { border-color:#c87f00; color:#ffb300; }
.night-btn.set { border-color:#c87f00; color:#ffb300; }

/* MODAL ALARMA con flechas */
#alarm-modal {
  display:none; position:fixed; top:0; left:0; right:0; bottom:0;
  background:rgba(6,4,0,0.96); z-index:100;
  -webkit-flex-direction:column; flex-direction:column;
  -webkit-align-items:center; align-items:center;
  -webkit-justify-content:center; justify-content:center; gap:2vh;
}
#alarm-modal.open { display:-webkit-flex; display:flex; }
.modal-title { font-size:2vw; letter-spacing:0.3em; color:#7a4e00; text-transform:uppercase; }

.alarm-picker {
  display:-webkit-flex; display:flex;
  -webkit-align-items:center; align-items:center;
  gap:3vw;
}
.picker-col {
  display:-webkit-flex; display:flex;
  -webkit-flex-direction:column; flex-direction:column;
  -webkit-align-items:center; align-items:center;
  gap:1.5vh;
}
.picker-btn {
  background:transparent; border:1px solid #3a2200; color:#c87f00;
  font-family:'Share Tech Mono','Courier New',monospace;
  font-size:3vw; width:8vw; height:6vh;
  cursor:pointer; border-radius:2px; -webkit-appearance:none;
  display:-webkit-flex; display:flex;
  -webkit-align-items:center; align-items:center;
  -webkit-justify-content:center; justify-content:center;
}
.picker-btn:active { background:rgba(255,179,0,0.1); }
.picker-val {
  font-family:'DSEG7','Courier New',monospace;
  font-size:12vw; color:#ffb300;
  text-shadow:0 0 20px rgba(255,179,0,0.5);
  letter-spacing:0.04em; line-height:1;
  min-width:16vw; text-align:center;
}
.picker-sep {
  font-family:'DSEG7','Courier New',monospace;
  font-size:12vw; color:#5a3800; line-height:1;
  margin-top:-1vh;
}

.modal-btns { display:-webkit-flex; display:flex; gap:4vw; margin-top:1vh; }
.modal-btn {
  background:transparent; border:1px solid #2a1400; color:#5a3800;
  font-family:'Share Tech Mono','Courier New',monospace;
  font-size:2vw; letter-spacing:0.2em;
  padding:1.2vh 4vw; cursor:pointer; border-radius:2px; -webkit-appearance:none;
}
.modal-btn.ok { border-color:#c87f00; color:#ffb300; }

/* RINGING */
#ringing {
  display:none; position:fixed; top:0; left:0; right:0; bottom:0;
  background:rgba(6,4,0,0.97); z-index:200;
  -webkit-flex-direction:column; flex-direction:column;
  -webkit-align-items:center; align-items:center;
  -webkit-justify-content:center; justify-content:center; gap:3vh;
}
#ringing.open { display:-webkit-flex; display:flex; }
#ring-clock {
  font-family:'DSEG7','Courier New',monospace; font-size:26vw; color:#ffb300;
  text-shadow:0 0 30px rgba(255,179,0,0.7);
  -webkit-animation:pulse 0.8s infinite alternate; animation:pulse 0.8s infinite alternate;
}
@-webkit-keyframes pulse { from{opacity:0.4} to{opacity:1} }
@keyframes pulse { from{opacity:0.4} to{opacity:1} }
#ring-label { font-size:2.5vw; letter-spacing:0.4em; color:#c87f00; text-transform:uppercase; }
#ring-stop {
  background:transparent; border:1px solid #ffb300; color:#ffb300;
  font-family:'Share Tech Mono','Courier New',monospace;
  font-size:2vw; letter-spacing:0.2em;
  padding:1.5vh 6vw; cursor:pointer; border-radius:2px; -webkit-appearance:none;
}
</style>
</head>
<body>
<div id="app">
  <div id="top-bar">
    <span class="top-label">CASIO &#183; BUE</span>
    <span id="alarm-ind"></span>
  </div>

  <div id="clock-block">
    <div class="lcd-wrap">
      <div class="lcd-ghost">88<span>:</span>88</div>
      <div class="lcd-real" id="clock-real">--<span class="sep-blink">:</span>--</div>
    </div>
    <div id="date-row">
      <span class="date-chip dim" id="date-day">DOM</span>
      <span class="date-chip" id="date-full">-- --- ----</span>
      <span id="sec-disp">00</span>
    </div>
  </div>

  <hr id="divider">

  <div id="widgets">

    <div class="widget" id="w-clima">
      <div class="widget-label">CLIMA</div>
      <div id="weather-content"><div class="w-line">CARGANDO...</div></div>
    </div>

    <div class="widget" id="w-radio">
      <div class="widget-label">RADIO</div>
      <button class="radio-btn" id="btn-continental" onclick="toggleRadio('continental')">CONTINENTAL AM 590</button>
      <button class="radio-btn" id="btn-aspen" onclick="toggleRadio('aspen')">ASPEN FM 102.3</button>
    </div>

    <div class="widget" id="w-alarm">
      <div class="widget-label">ALARMA</div>
      <div class="alarm-display" id="alarm-display">--:--</div>
      <div class="alarm-btns">
        <button class="alarm-btn-sm" onclick="openAlarmModal()">FIJAR</button>
        <button class="alarm-btn-sm active" id="alarm-clear-btn" onclick="clearAlarm()" style="display:none">BORRAR</button>
      </div>
    </div>

    <div class="widget" id="w-news">
      <div class="widget-label">NOTICIAS</div>
      <div id="news-source">--</div>
      <div id="news-headline">CARGANDO...</div>
    </div>

  </div>

  <div id="night-bar">
    <button class="night-btn" id="night-continental" onclick="toggleRadio('continental')">&#9654; CONTINENTAL 590</button>
    <button class="night-btn" id="night-aspen" onclick="toggleRadio('aspen')">&#9654; ASPEN 102.3</button>
    <button class="night-btn" id="night-alarm-btn" onclick="openAlarmModal()">ALARMA</button>
  </div>
</div>

<!-- MODAL ALARMA -->
<div id="alarm-modal">
  <div class="modal-title">FIJAR ALARMA</div>
  <div class="alarm-picker">
    <div class="picker-col">
      <button class="picker-btn" onclick="changeHour(1)">&#9650;</button>
      <div class="picker-val" id="pick-h">07</div>
      <button class="picker-btn" onclick="changeHour(-1)">&#9660;</button>
    </div>
    <div class="picker-sep">:</div>
    <div class="picker-col">
      <button class="picker-btn" onclick="changeMin(1)">&#9650;</button>
      <div class="picker-val" id="pick-m">00</div>
      <button class="picker-btn" onclick="changeMin(-1)">&#9660;</button>
    </div>
  </div>
  <div class="modal-btns">
    <button class="modal-btn" onclick="closeModal()">CANCELAR</button>
    <button class="modal-btn ok" onclick="saveAlarm()">CONFIRMAR</button>
  </div>
</div>

<!-- RINGING -->
<div id="ringing">
  <div id="ring-label">ALARMA</div>
  <div id="ring-clock">--:--</div>
  <button id="ring-stop" onclick="stopAlarm()">DETENER</button>
</div>

<audio id="radio-audio" preload="none"></audio>

<script>
var LAT=-34.5920,LON=-58.4229;
var DIAS=['DOM','LUN','MAR','MIE','JUE','VIE','SAB'];
var MESES=['ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'];
var WMO={0:'DESPEJADO',1:'CASI DESP.',2:'PARC.NUBLADO',3:'NUBLADO',45:'NIEBLA',48:'NIEBLA',51:'LLOVIZNA',53:'LLOVIZNA',55:'LLOVIZNA',61:'LLUVIA',63:'LLUVIA',65:'LLUVIA FUERTE',71:'NIEVE',73:'NIEVE',75:'NIEVE',80:'CHUBASCOS',81:'CHUBASCOS',82:'CHUBASCOS',95:'TORMENTA',96:'TORMENTA',99:'TORMENTA'};
var STREAMS={
  continental:'https://playerservices.streamtheworld.com/api/livestream-redirect/CONTINENTALAAC.aac',
  aspen:'https://playerservices.streamtheworld.com/api/livestream-redirect/ASPENAAC.aac'
};
var STREAMS_ALT={
  continental:'https://20283.live.streamtheworld.com/CONTINENTALAAC.aac',
  aspen:'https://20283.live.streamtheworld.com/ASPENAAC.aac'
};
var RSS=[{name:'INFOBAE',url:'https://www.infobae.com/feeds/rss/'},{name:'BBC MUNDO',url:'https://feeds.bbci.co.uk/mundo/rss.xml'}];
var CORS='https://api.allorigins.win/raw?url=';
var alarmTime=null,alarmFired=false,currentRadio=null,newsItems=[],newsIdx=0,newsTimer=null,alarmInt=null;
var pickH=7,pickM=0;

function pad(n){return n<10?'0'+n:''+n;}
function isNight(){var t=new Date().getHours()*60+new Date().getMinutes();return t>=23*60+30||t<7*60;}

function updateClock(){
  var now=new Date();
  var h=pad(now.getHours()),m=pad(now.getMinutes()),s=pad(now.getSeconds());
  document.getElementById('clock-real').innerHTML=h+'<span class="sep-blink">:</span>'+m;
  document.getElementById('sec-disp').textContent=s;
  document.getElementById('date-day').textContent=DIAS[now.getDay()];
  document.getElementById('date-full').textContent=pad(now.getDate())+' '+MESES[now.getMonth()]+' '+now.getFullYear();
  document.getElementById('app').className=isNight()?'night':'';
  checkAlarm(h+':'+m);
}

function checkAlarm(cur){
  if(!alarmTime)return;
  if(cur===alarmTime&&!alarmFired){alarmFired=true;ringAlarm();}
  if(cur!==alarmTime)alarmFired=false;
}

function ringAlarm(){
  document.getElementById('ring-clock').textContent=alarmTime;
  document.getElementById('ringing').classList.add('open');
  try{
    var ctx=new(window.AudioContext||window.webkitAudioContext)();
    function beep(){var o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=880;g.gain.setValueAtTime(0.5,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.3);o.start(ctx.currentTime);o.stop(ctx.currentTime+0.3);}
    beep();alarmInt=setInterval(function(){beep();setTimeout(beep,300);},950);
  }catch(e){}
}

function stopAlarm(){
  document.getElementById('ringing').classList.remove('open');
  if(alarmInt){clearInterval(alarmInt);alarmInt=null;}
}

function changeHour(d){pickH=(pickH+d+24)%24;document.getElementById('pick-h').textContent=pad(pickH);}
function changeMin(d){pickM=(pickM+d+60)%60;document.getElementById('pick-m').textContent=pad(pickM);}

function openAlarmModal(){
  if(alarmTime){var p=alarmTime.split(':');pickH=parseInt(p[0]);pickM=parseInt(p[1]);}
  document.getElementById('pick-h').textContent=pad(pickH);
  document.getElementById('pick-m').textContent=pad(pickM);
  document.getElementById('alarm-modal').classList.add('open');
}
function closeModal(){document.getElementById('alarm-modal').classList.remove('open');}

function saveAlarm(){
  alarmTime=pad(pickH)+':'+pad(pickM);
  alarmFired=false;
  document.getElementById('alarm-display').textContent=alarmTime;
  document.getElementById('alarm-display').className='alarm-display set';
  document.getElementById('alarm-clear-btn').style.display='block';
  document.getElementById('alarm-ind').textContent='ALM '+alarmTime;
  document.getElementById('night-alarm-btn').textContent='ALM '+alarmTime;
  document.getElementById('night-alarm-btn').className='night-btn set';
  closeModal();
}

function clearAlarm(){
  alarmTime=null;alarmFired=false;
  document.getElementById('alarm-display').textContent='--:--';
  document.getElementById('alarm-display').className='alarm-display';
  document.getElementById('alarm-clear-btn').style.display='none';
  document.getElementById('alarm-ind').textContent='';
  document.getElementById('night-alarm-btn').textContent='ALARMA';
  document.getElementById('night-alarm-btn').className='night-btn';
}

function toggleRadio(s){
  var audio=document.getElementById('radio-audio');
  if(currentRadio===s){audio.pause();audio.src='';currentRadio=null;updateBtns(null);return;}
  audio.pause();audio.src='';currentRadio=s;
  audio.src=STREAMS[s];audio.load();
  audio.play().catch(function(){audio.src=STREAMS_ALT[s];audio.load();audio.play().catch(function(){});});
  updateBtns(s);
}

function updateBtns(active){
  var data={continental:{day:'CONTINENTAL AM 590',night:'CONTINENTAL 590'},aspen:{day:'ASPEN FM 102.3',night:'ASPEN 102.3'}};
  var ss=['continental','aspen'];
  for(var i=0;i<ss.length;i++){
    var s=ss[i],on=s===active,pre=on?'\u25a0 ':'\u25b6 ';
    var b=document.getElementById('btn-'+s);
    var nb=document.getElementById('night-'+s);
    if(b){b.textContent=pre+data[s].day;b.className='radio-btn'+(on?' playing':'');}
    if(nb){nb.textContent=pre+data[s].night;nb.className='night-btn'+(on?' playing':'');}
  }
}

function fetchWeather(){
  var url='https://api.open-meteo.com/v1/forecast?latitude='+LAT+'&longitude='+LON+'&current_weather=true&daily=temperature_2m_max,temperature_2m_min,sunrise,sunset,weathercode&hourly=apparent_temperature,relativehumidity_2m&timezone=America%2FArgentina%2FBuenos_Aires&forecast_days=1';
  var xhr=new XMLHttpRequest();xhr.open('GET',url,true);
  xhr.onreadystatechange=function(){
    if(xhr.readyState!==4)return;
    var el=document.getElementById('weather-content');
    if(xhr.status===200){
      try{
        var d=JSON.parse(xhr.responseText),cw=d.current_weather;
        var temp=Math.round(cw.temperature),max=Math.round(d.daily.temperature_2m_max[0]),min=Math.round(d.daily.temperature_2m_min[0]);
        var hh=new Date().getHours();
        var sens=Math.round(d.hourly.apparent_temperature[hh]!==undefined?d.hourly.apparent_temperature[hh]:temp);
        var hum=d.hourly.relativehumidity_2m[hh]!==undefined?d.hourly.relativehumidity_2m[hh]:'--';
        var wind=Math.round(cw.windspeed),desc=WMO[cw.weathercode]||'VARIABLE';
        var sr=d.daily.sunrise[0].split('T')[1].substring(0,5);
        var ss2=d.daily.sunset[0].split('T')[1].substring(0,5);
        el.innerHTML='<div class="temp-wrap"><div class="temp-ghost">88!</div><div class="temp-real">'+temp+'<sup>&#176;</sup></div></div><div class="w-line">'+desc+'</div><div class="w-line">MIN <b>'+min+'&#176;</b> MAX <b>'+max+'&#176;</b></div><div class="w-line">&#9728; <b>'+sr+'</b> &nbsp; &#9790; <b>'+ss2+'</b></div>';
      }catch(e){el.innerHTML='<div class="w-line">SIN DATOS</div>';}
    }else{el.innerHTML='<div class="w-line">SIN DATOS</div>';}
  };xhr.send();
}

function parseRSS(xml){
  var items=[];
  try{var doc=new DOMParser().parseFromString(xml,'text/xml'),entries=doc.querySelectorAll('item');
    for(var i=0;i<Math.min(entries.length,6);i++){var t=entries[i].querySelector('title');if(t){var txt=t.textContent.replace(/<!\[CDATA\[|\]\]>/g,'').trim();if(txt)items.push(txt);}}
  }catch(e){}return items;
}

function fetchNews(){
  if(isNight())return;
  newsItems=[];var loaded=0;
  for(var i=0;i<RSS.length;i++){
    (function(feed){
      var xhr=new XMLHttpRequest();xhr.open('GET',CORS+encodeURIComponent(feed.url),true);
      xhr.onreadystatechange=function(){
        if(xhr.readyState!==4)return;
        if(xhr.status===200){var items=parseRSS(xhr.responseText);for(var j=0;j<items.length;j++)newsItems.push({source:feed.name,title:items[j]});}
        if(++loaded===RSS.length)startNews();
      };xhr.send();
    })(RSS[i]);
  }
}

function startNews(){
  if(newsTimer)clearInterval(newsTimer);
  if(!newsItems.length){document.getElementById('news-source').textContent='--';document.getElementById('news-headline').textContent='SIN NOTICIAS';return;}
  showNews(0);
  newsTimer=setInterval(function(){
    if(isNight())return;
    newsIdx=(newsIdx+1)%newsItems.length;
    var el=document.getElementById('news-headline');
    el.style.opacity='0';
    setTimeout(function(){showNews(newsIdx);el.style.opacity='1';},300);
  },20000);
}

function showNews(i){document.getElementById('news-source').textContent=newsItems[i].source;document.getElementById('news-headline').textContent=newsItems[i].title;}

updateClock();setInterval(updateClock,1000);
fetchWeather();setInterval(fetchWeather,30*60*1000);
fetchNews();setInterval(fetchNews,30*60*1000);
document.addEventListener('touchstart',function(){},false);
</script>
</body>
</html>
