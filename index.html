<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>CASIO</title>
<style>
@font-face {
  font-family: 'DSEG7';
  src: url('https://cdn.jsdelivr.net/npm/dseg@0.46.0/fonts/DSEG7-Classic/DSEG7Classic-Regular.woff2') format('woff2'),
       url('https://cdn.jsdelivr.net/npm/dseg@0.46.0/fonts/DSEG7-Classic/DSEG7Classic-Regular.woff') format('woff');
}
</style>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { width:100%; height:100%; overflow:hidden; background:#080500; }
body {
  display:-webkit-flex; display:flex;
  -webkit-align-items:center; align-items:center;
  -webkit-justify-content:center; justify-content:center;
  font-family:'Share Tech Mono','Courier New',monospace;
}

/* WATCH */
.watch {
  width:97vw; height:94vh;
  border:2px solid #7a4e00;
  border-radius:6px;
  background:#0d0800;
  position:relative;
  display:-webkit-flex; display:flex;
  -webkit-flex-direction:column; flex-direction:column;
  overflow:hidden;
  background-image:repeating-linear-gradient(0deg,rgba(0,0,0,0.18) 0px,rgba(0,0,0,0.18) 1px,transparent 1px,transparent 3px);
}
.watch-inner { position:absolute; inset:5px; border:1px solid #1e1000; border-radius:4px; pointer-events:none; z-index:1; }

/* HEADER */
.header {
  display:-webkit-flex; display:flex;
  -webkit-align-items:center; align-items:center;
  -webkit-justify-content:space-between; justify-content:space-between;
  padding:0.8vh 2vw;
  border-bottom:1px solid #1e1000;
  position:relative; z-index:2;
}
.h-label { font-size:1.4vw; letter-spacing:0.2em; color:#7a4e00; text-transform:uppercase; }
.h-seconds { font-size:1.4vw; letter-spacing:0.1em; color:#3a2200; }

/* MAIN: 3 columnas */
.main {
  display:-webkit-flex; display:flex;
  -webkit-flex-direction:row; flex-direction:row;
  -webkit-flex:1; flex:1;
  min-height:0;
  position:relative; z-index:2;
}

/* COLUMNA IZQUIERDA: CLIMA */
.col-left {
  width:22vw;
  display:-webkit-flex; display:flex;
  -webkit-flex-direction:column; flex-direction:column;
  padding:1.5vh 2vw;
  border-right:1px solid #1e1000;
}

/* COLUMNA CENTRAL: RELOJ */
.col-center {
  -webkit-flex:1; flex:1;
  display:-webkit-flex; display:flex;
  -webkit-flex-direction:column; flex-direction:column;
  -webkit-align-items:center; align-items:center;
  -webkit-justify-content:center; justify-content:center;
  padding:1vh 2vw;
}

/* COLUMNA DERECHA: RADIO + ALARMA + NOTICIAS */
.col-right {
  width:26vw;
  display:-webkit-flex; display:flex;
  -webkit-flex-direction:column; flex-direction:column;
  padding:1.5vh 2vw;
  border-left:1px solid #1e1000;
}

/* RELOJ */
.lcd-wrap { position:relative; display:inline-block; line-height:1; }
.lcd-ghost {
  font-family:'DSEG7','Courier New',monospace;
  font-size:17vw; letter-spacing:0.04em;
  position:absolute; top:0; left:0; color:#1e1000; pointer-events:none;
}
.lcd-real {
  font-family:'DSEG7','Courier New',monospace;
  font-size:17vw; letter-spacing:0.04em;
  position:relative; color:#ffb300;
  text-shadow:0 0 20px rgba(255,179,0,0.55),0 0 50px rgba(255,179,0,0.2);
}
.sep-blink { -webkit-animation:blink 1s step-end infinite; animation:blink 1s step-end infinite; }
@-webkit-keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.08} }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.08} }
.date-row { display:-webkit-flex; display:flex; gap:3vw; margin-top:2vh; }
.date-chip { font-size:2.2vw; letter-spacing:0.22em; color:#c87f00; text-transform:uppercase; }
.date-chip.bright { color:#ffb300; }

/* CLIMA */
.panel-label { font-size:1.3vw; letter-spacing:0.28em; color:#3a2200; text-transform:uppercase; margin-bottom:0.8vh; border-bottom:1px solid #1e1000; padding-bottom:0.4vh; }
.temp-wrap { position:relative; display:inline-block; line-height:1; margin-bottom:0.4vh; }
.temp-ghost { font-family:'DSEG7','Courier New',monospace; font-size:8vw; letter-spacing:0.04em; position:absolute; top:0; left:0; color:#1e1000; }
.temp-real { font-family:'DSEG7','Courier New',monospace; font-size:8vw; letter-spacing:0.04em; position:relative; color:#ffb300; text-shadow:0 0 10px rgba(255,179,0,0.4); }
.temp-real sup { font-size:2.2vw; vertical-align:super; opacity:0.75; font-family:'Share Tech Mono','Courier New',monospace; }
.w-desc { font-size:1.5vw; letter-spacing:0.08em; color:#c87f00; text-transform:uppercase; margin-top:0.3vh; }
.w-meta { font-size:1.4vw; line-height:2; color:#3a2200; margin-top:0.3vh; }
.w-meta b { color:#ffb300; }
.w-sun { font-size:1.4vw; line-height:2; color:#3a2200; }
.w-sun b { color:#c87f00; }

/* RADIO */
.radio-btns { display:-webkit-flex; display:flex; -webkit-flex-direction:column; flex-direction:column; gap:1vh; margin-bottom:1.2vh; }
.radio-btn {
  background:transparent; border:1px solid #2a1400; color:#5a3800;
  font-family:'Share Tech Mono','Courier New',monospace;
  font-size:1.5vw; letter-spacing:0.1em;
  padding:0.8vh 1.5vw; cursor:pointer; text-align:left; border-radius:2px; -webkit-appearance:none;
}
.radio-btn.playing { border-color:#c87f00; color:#ffb300; background:rgba(255,179,0,0.05); }

/* ALARMA */
.alarm-row { display:-webkit-flex; display:flex; -webkit-align-items:center; align-items:center; gap:1.5vw; margin-bottom:1vh; }
.alarm-btn {
  background:transparent; border:1px solid #2a1400; color:#5a3800;
  font-family:'Share Tech Mono','Courier New',monospace;
  font-size:1.4vw; letter-spacing:0.1em;
  padding:0.6vh 1.5vw; cursor:pointer; border-radius:2px; -webkit-appearance:none; white-space:nowrap;
}
.alarm-btn.set { border-color:#c87f00; color:#ffb300; }
.alarm-set-time { font-size:1.5vw; color:#c87f00; letter-spacing:0.1em; }
.alarm-dismiss {
  background:transparent; border:1px solid #1e1000; color:#2a1400;
  font-family:'Share Tech Mono','Courier New',monospace; font-size:1.3vw;
  padding:0.3vh 0.8vw; cursor:pointer; border-radius:2px; -webkit-appearance:none; display:none;
}

/* NOTICIAS */
.news-divider { border:none; border-top:1px solid #1e1000; margin:0.6vh 0; }
.news-source { font-size:1.3vw; letter-spacing:0.28em; color:#2a1400; text-transform:uppercase; margin-bottom:0.4vh; }
.news-headline { font-size:1.5vw; color:#5a3800; letter-spacing:0.04em; line-height:1.6; }

/* MODAL ALARMA */
.modal-overlay {
  display:none; position:absolute; top:0; left:0; right:0; bottom:0;
  background:rgba(8,5,0,0.94); z-index:100;
  -webkit-flex-direction:column; flex-direction:column;
  -webkit-align-items:center; align-items:center;
  -webkit-justify-content:center; justify-content:center; gap:3vh;
}
.modal-overlay.open { display:-webkit-flex; display:flex; }
.modal-title { font-size:1.8vw; letter-spacing:0.3em; color:#7a4e00; text-transform:uppercase; }
.modal-input {
  font-family:'DSEG7','Courier New',monospace; font-size:10vw;
  background:transparent; border:none; border-bottom:1px solid #ffb300;
  color:#ffb300; text-align:center; width:50vw; outline:none; -webkit-appearance:none;
}
.modal-btns { display:-webkit-flex; display:flex; gap:3vw; }
.modal-btn {
  background:transparent; border:1px solid #2a1400; color:#5a3800;
  font-family:'Share Tech Mono','Courier New',monospace;
  font-size:1.6vw; letter-spacing:0.2em; padding:1vh 3vw; cursor:pointer; border-radius:2px; -webkit-appearance:none;
}
.modal-btn.ok { border-color:#c87f00; color:#ffb300; }

/* RINGING */
.ringing-overlay {
  display:none; position:absolute; top:0; left:0; right:0; bottom:0;
  background:rgba(8,5,0,0.96); z-index:200;
  -webkit-flex-direction:column; flex-direction:column;
  -webkit-align-items:center; align-items:center;
  -webkit-justify-content:center; justify-content:center; gap:3vh;
}
.ringing-overlay.open { display:-webkit-flex; display:flex; }
.ring-time {
  font-family:'DSEG7','Courier New',monospace; font-size:22vw; color:#ffb300;
  text-shadow:0 0 24px rgba(255,179,0,0.6);
  -webkit-animation:pulse 0.8s infinite alternate; animation:pulse 0.8s infinite alternate;
}
@-webkit-keyframes pulse { from{opacity:0.5} to{opacity:1} }
@keyframes pulse { from{opacity:0.5} to{opacity:1} }
.ring-label { font-size:2vw; letter-spacing:0.35em; color:#c87f00; text-transform:uppercase; }
.ring-stop {
  background:transparent; border:1px solid #ffb300; color:#ffb300;
  font-family:'Share Tech Mono','Courier New',monospace;
  font-size:1.8vw; letter-spacing:0.2em; padding:1.2vh 4vw; cursor:pointer; border-radius:2px; -webkit-appearance:none;
}

/* MODO NOCHE */
.night-mode .col-left { display:none; }
.night-mode .col-right { display:none; }
.night-mode .col-center { width:100%; }
.night-mode .lcd-real { font-size:26vw; }
.night-mode .lcd-ghost { font-size:26vw; }
.night-mode .date-chip { font-size:3vw; }
.night-mode .night-controls { display:-webkit-flex !important; display:flex !important; }

.night-controls {
  display:none;
  -webkit-flex-direction:row; flex-direction:row;
  -webkit-align-items:center; align-items:center;
  -webkit-justify-content:center; justify-content:center;
  gap:4vw; padding:1.5vh 2vw;
  border-top:1px solid #1e1000;
  position:relative; z-index:2;
}
.night-radio-btn {
  background:transparent; border:1px solid #2a1400; color:#5a3800;
  font-family:'Share Tech Mono','Courier New',monospace;
  font-size:1.8vw; letter-spacing:0.15em; padding:0.8vh 3vw; cursor:pointer; border-radius:2px; -webkit-appearance:none;
}
.night-radio-btn.playing { border-color:#c87f00; color:#ffb300; }
.night-alarm-btn {
  background:transparent; border:1px solid #2a1400; color:#5a3800;
  font-family:'Share Tech Mono','Courier New',monospace;
  font-size:1.8vw; letter-spacing:0.15em; padding:0.8vh 3vw; cursor:pointer; border-radius:2px; -webkit-appearance:none;
}
.night-alarm-btn.set { border-color:#c87f00; color:#ffb300; }
</style>
</head>
<body>
<div class="watch" id="watch">
  <div class="watch-inner"></div>

  <!-- HEADER -->
  <div class="header">
    <span class="h-label">&#9679; CASIO &#183; BUE</span>
    <span class="h-seconds" id="seconds">00</span>
    <span class="h-label" id="alarm-ind"></span>
  </div>

  <!-- MAIN 3 COLUMNAS -->
  <div class="main">

    <!-- IZQUIERDA: CLIMA -->
    <div class="col-left">
      <div class="panel-label">&#9650; CLIMA</div>
      <div id="weather-section"><div class="w-desc">CARGANDO...</div></div>
    </div>

    <!-- CENTRO: RELOJ -->
    <div class="col-center">
      <div class="lcd-wrap">
        <div class="lcd-ghost" id="clock-ghost">88<span>:</span>88</div>
        <div class="lcd-real" id="clock-real">00<span class="sep-blink">:</span>00</div>
      </div>
      <div class="date-row">
        <div class="date-chip" id="date-day">DOM</div>
        <div class="date-chip bright" id="date-full">-- --- ----</div>
      </div>
    </div>

    <!-- DERECHA: RADIO + ALARMA + NOTICIAS -->
    <div class="col-right">
      <div class="panel-label">&#9632; RADIO</div>
      <div class="radio-btns">
        <button class="radio-btn" id="btn-lared" onclick="toggleRadio('lared')">&#9654; LA RED AM 910</button>
        <button class="radio-btn" id="btn-aspen" onclick="toggleRadio('aspen')">&#9654; ASPEN FM 102.3</button>
      </div>
      <div class="panel-label">&#9675; ALARMA</div>
      <div class="alarm-row">
        <button class="alarm-btn" id="alarm-btn" onclick="openAlarmModal()">FIJAR</button>
        <span class="alarm-set-time" id="alarm-set-time"></span>
        <button class="alarm-dismiss" id="alarm-dismiss" onclick="clearAlarm()">X</button>
      </div>
      <hr class="news-divider">
      <div id="news-wrap">
        <div class="news-source" id="news-source">NOTICIAS</div>
        <div class="news-headline" id="news-headline">CARGANDO...</div>
      </div>
    </div>

  </div>

  <!-- NOCHE: barra inferior con radio y alarma -->
  <div class="night-controls" id="night-controls">
    <button class="night-radio-btn" id="night-btn-lared" onclick="toggleRadio('lared')">&#9654; LA RED 910</button>
    <button class="night-radio-btn" id="night-btn-aspen" onclick="toggleRadio('aspen')">&#9654; ASPEN 102.3</button>
    <button class="night-alarm-btn" id="night-alarm-btn" onclick="openAlarmModal()">&#9675; ALARMA</button>
  </div>

</div>

<!-- MODAL ALARMA -->
<div class="modal-overlay" id="alarm-modal">
  <div class="modal-title">FIJAR ALARMA</div>
  <input type="time" class="modal-input" id="alarm-input">
  <div class="modal-btns">
    <button class="modal-btn" onclick="closeAlarmModal()">CANCELAR</button>
    <button class="modal-btn ok" onclick="saveAlarm()">CONFIRMAR</button>
  </div>
</div>

<!-- RINGING -->
<div class="ringing-overlay" id="ringing-overlay">
  <div class="ring-label">&#9679;&#9679;&#9679; ALARMA &#9679;&#9679;&#9679;</div>
  <div class="ring-time" id="ring-time">00:00</div>
  <button class="ring-stop" onclick="stopAlarm()">DETENER</button>
</div>

<audio id="radio-audio" preload="none"></audio>

<script>
var LAT=-34.5920,LON=-58.4229;
var DIAS=['DOM','LUN','MAR','MIE','JUE','VIE','SAB'];
var MESES=['ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'];
var WMO={0:'DESPEJADO',1:'CASI DESP.',2:'PARC.NUBLADO',3:'NUBLADO',45:'NIEBLA',48:'NIEBLA',51:'LLOVIZNA',53:'LLOVIZNA',55:'LLOVIZNA',61:'LLUVIA',63:'LLUVIA',65:'LLUVIA FUERTE',71:'NIEVE',73:'NIEVE',75:'NIEVE',80:'CHUBASCOS',81:'CHUBASCOS',82:'CHUBASCOS',95:'TORMENTA',96:'TORMENTA',99:'TORMENTA'};
var STREAMS={lared:'https://playerservices.streamtheworld.com/api/livestream-redirect/LA_REDAAC.aac',aspen:'https://playerservices.streamtheworld.com/api/livestream-redirect/ASPENAAC.aac'};
var STREAMS_ALT={lared:'https://20283.live.streamtheworld.com/LA_REDAAC.aac',aspen:'https://20283.live.streamtheworld.com/ASPENAAC.aac'};
var RSS_FEEDS=[{name:'INFOBAE',url:'https://www.infobae.com/feeds/rss/'},{name:'BBC MUNDO',url:'https://feeds.bbci.co.uk/mundo/rss.xml'}];
var CORS='https://api.allorigins.win/raw?url=';
var alarmTime=null,alarmFired=false,currentRadio=null,newsItems=[],newsIdx=0,newsTimer=null,alarmInterval=null;
function pad(n){return n<10?'0'+n:''+n;}
function isNight(){var h=new Date().getHours(),m=new Date().getMinutes(),t=h*60+m;return t>=23*60+30||t<7*60;}
function updateClock(){
  var now=new Date();
  document.getElementById('clock-real').innerHTML=pad(now.getHours())+'<span class="sep-blink">:</span>'+pad(now.getMinutes());
  document.getElementById('seconds').textContent=pad(now.getSeconds());
  document.getElementById('date-day').textContent=DIAS[now.getDay()];
  document.getElementById('date-full').textContent=pad(now.getDate())+' '+MESES[now.getMonth()]+' '+now.getFullYear();
  var w=document.getElementById('watch');
  if(isNight()){w.classList.add('night-mode');}else{w.classList.remove('night-mode');}
  checkAlarm(pad(now.getHours())+':'+pad(now.getMinutes()));
}
function checkAlarm(cur){if(!alarmTime)return;if(cur===alarmTime&&!alarmFired){alarmFired=true;ringAlarm();}if(cur!==alarmTime)alarmFired=false;}
function ringAlarm(){
  document.getElementById('ringing-overlay').classList.add('open');
  document.getElementById('ring-time').textContent=alarmTime;
  try{
    var ctx=new(window.AudioContext||window.webkitAudioContext)();
    function beep(){var o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=880;g.gain.setValueAtTime(0.4,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.25);o.start(ctx.currentTime);o.stop(ctx.currentTime+0.25);}
    beep();alarmInterval=setInterval(function(){beep();setTimeout(beep,300);},900);
  }catch(e){}
}
function stopAlarm(){document.getElementById('ringing-overlay').classList.remove('open');if(alarmInterval){clearInterval(alarmInterval);alarmInterval=null;}}
function openAlarmModal(){document.getElementById('alarm-modal').classList.add('open');if(alarmTime)document.getElementById('alarm-input').value=alarmTime;}
function closeAlarmModal(){document.getElementById('alarm-modal').classList.remove('open');}
function saveAlarm(){
  var val=document.getElementById('alarm-input').value;
  if(!val){closeAlarmModal();return;}
  alarmTime=val;alarmFired=false;
  document.getElementById('alarm-btn').className='alarm-btn set';
  document.getElementById('alarm-btn').textContent='ALM '+val;
  document.getElementById('alarm-set-time').textContent='';
  document.getElementById('alarm-dismiss').style.display='inline-block';
  document.getElementById('alarm-ind').textContent='ALM '+val;
  document.getElementById('night-alarm-btn').className='night-alarm-btn set';
  document.getElementById('night-alarm-btn').textContent='ALM '+val;
  closeAlarmModal();
}
function clearAlarm(){
  alarmTime=null;alarmFired=false;
  document.getElementById('alarm-btn').className='alarm-btn';
  document.getElementById('alarm-btn').textContent='FIJAR';
  document.getElementById('alarm-set-time').textContent='';
  document.getElementById('alarm-dismiss').style.display='none';
  document.getElementById('alarm-ind').textContent='';
  document.getElementById('night-alarm-btn').className='night-alarm-btn';
  document.getElementById('night-alarm-btn').textContent='\u25cb ALARMA';
}
function toggleRadio(s){
  var audio=document.getElementById('radio-audio');
  if(currentRadio===s){audio.pause();audio.src='';currentRadio=null;updateBtns(null);return;}
  audio.pause();audio.src='';currentRadio=s;
  audio.src=STREAMS[s];audio.load();
  audio.play().catch(function(){audio.src=STREAMS_ALT[s];audio.load();audio.play().catch(function(){});});
  updateBtns(s);
}
function updateBtns(active){
  var ss=['lared','aspen'];
  for(var i=0;i<ss.length;i++){
    var s=ss[i],playing=s===active;
    var lbl=s==='lared'?'LA RED AM 910':'ASPEN FM 102.3';
    var nlbl=s==='lared'?'LA RED 910':'ASPEN 102.3';
    var pre=playing?'\u25a0 ':'\u25b6 ';
    var b=document.getElementById('btn-'+s);
    var nb=document.getElementById('night-btn-'+s);
    if(b){b.textContent=pre+lbl;b.className='radio-btn'+(playing?' playing':'');}
    if(nb){nb.textContent=pre+nlbl;nb.className='night-radio-btn'+(playing?' playing':'');}
  }
}
function fetchWeather(){
  var url='https://api.open-meteo.com/v1/forecast?latitude='+LAT+'&longitude='+LON+'&current_weather=true&daily=temperature_2m_max,temperature_2m_min,sunrise,sunset,weathercode&hourly=apparent_temperature,relativehumidity_2m&timezone=America%2FArgentina%2FBuenos_Aires&forecast_days=1';
  var xhr=new XMLHttpRequest();xhr.open('GET',url,true);
  xhr.onreadystatechange=function(){
    if(xhr.readyState!==4)return;
    var el=document.getElementById('weather-section');
    if(xhr.status===200){
      try{
        var d=JSON.parse(xhr.responseText),cw=d.current_weather;
        var temp=Math.round(cw.temperature),max=Math.round(d.daily.temperature_2m_max[0]),min=Math.round(d.daily.temperature_2m_min[0]);
        var h=new Date().getHours();
        var sens=Math.round(d.hourly.apparent_temperature[h]!==undefined?d.hourly.apparent_temperature[h]:temp);
        var hum=d.hourly.relativehumidity_2m[h]!==undefined?d.hourly.relativehumidity_2m[h]:'--';
        var wind=Math.round(cw.windspeed),desc=WMO[cw.weathercode]||'VARIABLE';
        var sunrise=d.daily.sunrise[0].split('T')[1].substring(0,5);
        var sunset=d.daily.sunset[0].split('T')[1].substring(0,5);
        el.innerHTML='<div class="temp-wrap"><div class="temp-ghost">88!</div><div class="temp-real">'+temp+'<sup>&#176;C</sup></div></div><div class="w-desc">'+desc+'</div><div class="w-meta">MIN <b>'+min+'&#176;</b> MAX <b>'+max+'&#176;</b><br>SENS <b>'+sens+'&#176;</b> HUM <b>'+hum+'%</b><br>VIENTO <b>'+wind+'KM/H</b></div><div class="w-sun">&#9728; <b>'+sunrise+'</b> &nbsp; &#9790; <b>'+sunset+'</b></div>';
      }catch(e){el.innerHTML='<div class="w-desc">SIN DATOS</div>';}
    }else{el.innerHTML='<div class="w-desc">SIN DATOS</div>';}
  };xhr.send();
}
function parseRSS(xml){
  var items=[];
  try{var p=new DOMParser(),doc=p.parseFromString(xml,'text/xml'),entries=doc.querySelectorAll('item');
    for(var i=0;i<Math.min(entries.length,6);i++){var t=entries[i].querySelector('title');if(t){var txt=t.textContent.replace(/<!\[CDATA\[|\]\]>/g,'').trim();if(txt)items.push(txt);}}
  }catch(e){}return items;
}
function fetchNews(){
  if(isNight())return;
  newsItems=[];var loaded=0;
  for(var i=0;i<RSS_FEEDS.length;i++){
    (function(feed){
      var xhr=new XMLHttpRequest();xhr.open('GET',CORS+encodeURIComponent(feed.url),true);
      xhr.onreadystatechange=function(){
        if(xhr.readyState!==4)return;
        if(xhr.status===200){var items=parseRSS(xhr.responseText);for(var j=0;j<items.length;j++)newsItems.push({source:feed.name,title:items[j]});}
        loaded++;if(loaded===RSS_FEEDS.length)startNews();
      };xhr.send();
    })(RSS_FEEDS[i]);
  }
}
function startNews(){
  if(newsTimer)clearInterval(newsTimer);
  if(!newsItems.length){document.getElementById('news-source').textContent='--';document.getElementById('news-headline').textContent='SIN NOTICIAS';return;}
  showNewsItem(0);
  newsTimer=setInterval(function(){if(isNight())return;newsIdx=(newsIdx+1)%newsItems.length;var el=document.getElementById('news-headline');el.style.opacity='0';setTimeout(function(){showNewsItem(newsIdx);el.style.opacity='1';},300);},20000);
}
function showNewsItem(idx){if(!newsItems.length)return;var item=newsItems[idx];document.getElementById('news-source').textContent=item.source;document.getElementById('news-headline').textContent=item.title;}
updateClock();setInterval(updateClock,1000);
fetchWeather();setInterval(fetchWeather,30*60*1000);
fetchNews();setInterval(fetchNews,30*60*1000);
document.addEventListener('touchstart',function(){},false);
</script>
</body>
</html>
